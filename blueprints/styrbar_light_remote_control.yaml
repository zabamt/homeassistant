blueprint:
  name: Styrbar Remote Control for Lights
  description: 'Provides integration and control for the IKEA E2001/E2002 Styrbar
    remote control. Allows for turning lights on/off, adjusting brightness, and changing
    color (hue rotation). Designed for a Zigbee2MQTT group of light bulbs.

    '
  domain: automation
  input:
    light_entity:
      name: Light Entity
      description: The light to control.
      selector:
        entity:
          domain:
          - light
          multiple: false
          reorder: false
    mqtt_device:
      name: Styrbar Remote Control
      description: The IKEA E2001/E2002 remote control.
      selector:
        device:
          multiple: false
    hue_step:
      name: Hue Step
      description: Hue adjustment step in degrees (1–60). Single click moves by this amount.
      default: 30
      selector:
        number:
          min: 1.0
          max: 60.0
          step: 1.0
          unit_of_measurement: '°'
          mode: slider
    hue_step_hold:
      name: Hue Step (Hold)
      description: Hue adjustment step in degrees while holding the button.
      default: 10
      selector:
        number:
          min: 1.0
          max: 30.0
          step: 1.0
          unit_of_measurement: '°'
          mode: slider
    brightness_step:
      name: Brightness Step
      description: Brightness adjustment step (slider percentage, 1-100%).
      default: 5
      selector:
        number:
          min: 1.0
          max: 100.0
          step: 1.0
          unit_of_measurement: '%'
          mode: slider
    delay_ms:
      name: Delay (ms) Between Steps
      description: Delay in milliseconds between brightness/hue adjustment steps.
      default: 300
      selector:
        number:
          min: 100.0
          max: 2000.0
          step: 100.0
          unit_of_measurement: ms
          mode: slider
    transition_seconds:
      name: Transition Time (Seconds)
      description: The duration in seconds for the light transition effect.
      default: 1
      selector:
        number:
          min: 0.1
          max: 9999.0
          step: 0.1
          unit_of_measurement: s
          mode: slider
  source_url: https://github.com/ouhlar/home_assistant/blob/main/blueprints/styrbar_light_remote_control.yaml

trigger:
- platform: device
  device_id: !input mqtt_device
  domain: mqtt
  type: action
  subtype: 'on'
  id: light_on
- platform: device
  device_id: !input mqtt_device
  domain: mqtt
  type: action
  subtype: 'off'
  id: light_off
- platform: device
  device_id: !input mqtt_device
  domain: mqtt
  type: action
  subtype: arrow_left_click
  id: change_color_left
- platform: device
  device_id: !input mqtt_device
  domain: mqtt
  type: action
  subtype: arrow_left_hold
  id: change_color_left_hold
- platform: device
  device_id: !input mqtt_device
  domain: mqtt
  type: action
  subtype: arrow_left_release
  id: change_color_left_release
- platform: device
  device_id: !input mqtt_device
  domain: mqtt
  type: action
  subtype: arrow_right_click
  id: change_color_right
- platform: device
  device_id: !input mqtt_device
  domain: mqtt
  type: action
  subtype: arrow_right_hold
  id: change_color_right_hold
- platform: device
  device_id: !input mqtt_device
  domain: mqtt
  type: action
  subtype: arrow_right_release
  id: change_color_right_release
- platform: device
  device_id: !input mqtt_device
  domain: mqtt
  type: action
  subtype: brightness_move_down
  id: dim_down
- platform: device
  device_id: !input mqtt_device
  domain: mqtt
  type: action
  subtype: brightness_move_up
  id: dim_up
- platform: device
  device_id: !input mqtt_device
  domain: mqtt
  type: action
  subtype: brightness_stop
  id: dim_stop

variables:
  light_entity: !input light_entity
  brightness_step: !input brightness_step
  hue_step: !input hue_step
  hue_step_hold: !input hue_step_hold

action:
- choose:
  - conditions:
    - condition: trigger
      id: light_on
    sequence:
    - service: light.turn_on
      target:
        entity_id: !input light_entity

  - conditions:
    - condition: trigger
      id: light_off
    sequence:
    - service: light.turn_off
      target:
        entity_id: !input light_entity

  - conditions:
    - condition: trigger
      id: change_color_left
    sequence:
    - service: light.turn_on
      target:
        entity_id: !input light_entity
      data:
        hs_color:
          - >-
            {{ ((state_attr(light_entity, 'hs_color')[0] - hue_step) % 360 + 360) % 360 }}
          - >-
            {{ state_attr(light_entity, 'hs_color')[1] }}
        transition: !input transition_seconds

  - conditions:
    - condition: trigger
      id: change_color_left_hold
    sequence:
    - repeat:
        sequence:
        - service: light.turn_on
          target:
            entity_id: !input light_entity
          data:
            hs_color:
              - >-
                {{ ((state_attr(light_entity, 'hs_color')[0] - hue_step_hold) % 360 + 360) % 360 }}
              - >-
                {{ state_attr(light_entity, 'hs_color')[1] }}
            transition: !input transition_seconds
        - delay:
            milliseconds: !input delay_ms
        until:
        - condition: trigger
          id: change_color_left_release

  - conditions:
    - condition: trigger
      id: change_color_right
    sequence:
    - service: light.turn_on
      target:
        entity_id: !input light_entity
      data:
        hs_color:
          - >-
            {{ ((state_attr(light_entity, 'hs_color')[0] + hue_step) % 360) }}
          - >-
            {{ state_attr(light_entity, 'hs_color')[1] }}
        transition: !input transition_seconds

  - conditions:
    - condition: trigger
      id: change_color_right_hold
    sequence:
    - repeat:
        sequence:
        - service: light.turn_on
          target:
            entity_id: !input light_entity
          data:
            hs_color:
              - >-
                {{ ((state_attr(light_entity, 'hs_color')[0] + hue_step_hold) % 360) }}
              - >-
                {{ state_attr(light_entity, 'hs_color')[1] }}
            transition: !input transition_seconds
        - delay:
            milliseconds: !input delay_ms
        until:
        - condition: trigger
          id: change_color_right_release

  - conditions:
    - condition: trigger
      id: dim_down
    sequence:
    - repeat:
        sequence:
        - service: light.turn_on
          target:
            entity_id: !input light_entity
          data:
            brightness_step_pct: -{{ brightness_step | int(5) }}
            transition: !input transition_seconds
        - delay:
            milliseconds: !input delay_ms
        until:
        - condition: trigger
          id: dim_stop

  - conditions:
    - condition: trigger
      id: dim_up
    sequence:
    - repeat:
        sequence:
        - service: light.turn_on
          target:
            entity_id: !input light_entity
          data:
            brightness_step_pct: '{{ brightness_step | int(5) }}'
            transition: !input transition_seconds
        - delay:
            milliseconds: !input delay_ms
        until:
        - condition: trigger
          id: dim_stop

mode: restart
